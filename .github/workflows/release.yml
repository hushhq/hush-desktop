name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      hush_web_ref:
        description: 'hush-web ref to build into the desktop renderer'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            runner: macos-latest
            script: dist:mac
            artifact: hush-desktop-mac
            timeout_minutes: 150
          - platform: windows
            runner: windows-latest
            script: dist:win
            artifact: hush-desktop-windows
            timeout_minutes: 60
          - platform: linux
            runner: ubuntu-latest
            script: dist:linux
            artifact: hush-desktop-linux
            timeout_minutes: 60
    timeout-minutes: ${{ matrix.timeout_minutes }}

    steps:
      - name: Checkout hush-desktop
        uses: actions/checkout@v4
        with:
          path: hush-desktop

      - name: Checkout hush-web
        uses: actions/checkout@v4
        with:
          repository: hushhq/hush-web
          ref: ${{ inputs.hush_web_ref || 'main' }}
          path: hush-web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            hush-desktop/package-lock.json
            hush-web/package-lock.json

      - name: Install hush-web dependencies
        run: npm ci
        working-directory: hush-web

      - name: Install hush-desktop dependencies
        run: npm ci
        working-directory: hush-desktop

      - name: Typecheck desktop
        run: npm run typecheck
        working-directory: hush-desktop

      - name: Test desktop
        run: npm test
        working-directory: hush-desktop

      - name: Materialize Apple notarization key
        if: matrix.platform == 'mac'
        run: |
          mkdir -p "$RUNNER_TEMP/apple-notary"
          chmod 700 "$RUNNER_TEMP/apple-notary"
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/apple-notary/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/apple-notary/AuthKey_${APPLE_API_KEY_ID}.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Build signed macOS artifacts
        if: matrix.platform == 'mac'
        run: npm run ${{ matrix.script }} -- --publish never
        working-directory: hush-desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.MAC_CSC_NAME || 'Developer ID Application' }}
          APPLE_API_KEY: ${{ runner.temp }}/apple-notary/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          HUSH_DESKTOP_NOTARIZE_APP: '1'
          HUSH_NOTARY_TIMEOUT_MINUTES: '60'
          HUSH_DESKTOP_RELEASE_BUILD: '1'
          HUSH_DESKTOP_STRICT_RELEASE: '1'

      - name: Verify signed macOS artifacts
        if: matrix.platform == 'mac'
        run: node scripts/verify-mac-release-artifacts.cjs
        working-directory: hush-desktop

      - name: Build unsigned non-macOS artifacts
        if: matrix.platform != 'mac'
        run: npm run ${{ matrix.script }} -- --publish never
        working-directory: hush-desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          HUSH_DESKTOP_RELEASE_BUILD: '1'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            hush-desktop/dist/*.dmg
            hush-desktop/dist/*.zip
            hush-desktop/dist/*.exe
            hush-desktop/dist/*.AppImage
            hush-desktop/dist/*.deb
            hush-desktop/dist/*.tar.gz
            hush-desktop/dist/latest*.yml
            hush-desktop/dist/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout hush-desktop
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name sha256sums.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum > sha256sums.txt

      # Release notes come from CHANGELOG.md, not auto-generated commit logs.
      # The tag vX.Y.Z maps to the `## [X.Y.Z]` section; a missing section fails
      # the release so CHANGELOG.md is bumped before every tag.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          section="$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {inv=1; next}
            inv && /^## \[/ {exit}
            inv {print}
          ' CHANGELOG.md)"
          if [ -z "$(printf '%s' "$section" | tr -d '[:space:]')" ]; then
            echo "::error::No CHANGELOG.md section for ${version}. Add a '## [${version}]' entry before tagging."
            exit 1
          fi
          {
            echo "body<<__CHANGELOG_EOF__"
            printf '%s\n' "$section"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'mvp') }}
          body: ${{ steps.notes.outputs.body }}
          files: release-assets/*

  # Propagate the published release to the package-manager surfaces. The landing
  # (gethush.live) resolves the latest release at runtime, so it is not bumped
  # here. Runs only for tag releases (the publish job above is tag-gated too).
  update-distribution:
    name: Update AUR + Homebrew
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hush-desktop
        uses: actions/checkout@v4

      - name: Resolve version + checksums
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"          # e.g. v0.1.44-mvp
          version="${tag#v}"                # 0.1.44-mvp (cask + asset filenames)
          pkgver="${version%-mvp}"          # 0.1.44 (AUR pkgver; source re-adds -mvp)
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern sha256sums.txt -O sha.txt
          deb_sha=$(grep "hush-desktop_${version}_amd64.deb$" sha.txt | awk '{print $1}')
          arm_sha=$(grep "Hush-${version}-arm64.dmg$" sha.txt | awk '{print $1}')
          x64_sha=$(grep "Hush-${version}.dmg$" sha.txt | awk '{print $1}')
          for v in "$deb_sha" "$arm_sha" "$x64_sha"; do
            [ -n "$v" ] || { echo "::error::missing checksum for $version"; exit 1; }
          done
          {
            echo "version=$version"
            echo "pkgver=$pkgver"
            echo "deb_sha=$deb_sha"
            echo "arm_sha=$arm_sha"
            echo "x64_sha=$x64_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare AUR PKGBUILD
        env:
          PKGVER: ${{ steps.meta.outputs.pkgver }}
          DEB_SHA: ${{ steps.meta.outputs.deb_sha }}
        run: |
          set -euo pipefail
          # The deploy-aur action runs inside a Docker container that only
          # mounts the workspace, so the PKGBUILD it reads must live under the
          # workspace (a relative path); an absolute /tmp path is not visible
          # in the container. Edit the checked-in copy in place.
          sed -i "s|^pkgver=.*|pkgver=${PKGVER}|" packaging/aur/PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${DEB_SHA}')|" packaging/aur/PKGBUILD

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: hush-desktop-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: hush-ci
          commit_email: security@gethush.live
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "upgpkg: hush-desktop-bin ${{ steps.meta.outputs.pkgver }}-1"

      # The Homebrew cask is independent of the AUR package: a failure
      # publishing one must not skip the other. Gate the cask steps on the
      # checksum resolution succeeding, not on the AUR step.
      - name: Mint Homebrew tap token
        id: tap-token
        if: ${{ !cancelled() && steps.meta.outcome == 'success' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CASK_APP_ID }}
          private-key: ${{ secrets.CASK_APP_PRIVATE_KEY }}
          owner: hushhq
          repositories: homebrew-hush

      - name: Update Homebrew cask
        if: ${{ !cancelled() && steps.meta.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          V: ${{ steps.meta.outputs.version }}
          ARM: ${{ steps.meta.outputs.arm_sha }}
          X64: ${{ steps.meta.outputs.x64_sha }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/hushhq/homebrew-hush.git" tap
          cd tap
          sed -i "s/version \".*\"/version \"${V}\"/" Casks/hush.rb
          # Replace the sha256 inside the on_arm / on_intel blocks specifically.
          perl -0pi -e "s/(on_arm do\s*\n\s*sha256 \")[a-f0-9]+(\")/\${1}${ARM}\${2}/" Casks/hush.rb
          perl -0pi -e "s/(on_intel do\s*\n\s*sha256 \")[a-f0-9]+(\")/\${1}${X64}\${2}/" Casks/hush.rb
          git config user.name "hush-cask-bumper[bot]"
          git config user.email "hush-cask-bumper[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "cask already up to date"
          else
            git commit -am "feat(cask): bump hush to ${V}"
            git push
          fi
