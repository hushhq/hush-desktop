name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      hush_web_ref:
        description: 'hush-web ref to build into the desktop renderer'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            runner: macos-latest
            script: dist:mac
            artifact: hush-desktop-mac
          - platform: windows
            runner: windows-latest
            script: dist:win
            artifact: hush-desktop-windows
          - platform: linux
            runner: ubuntu-latest
            script: dist:linux
            artifact: hush-desktop-linux

    steps:
      - name: Checkout hush-desktop
        uses: actions/checkout@v4
        with:
          path: hush-desktop

      - name: Checkout hush-web
        uses: actions/checkout@v4
        with:
          repository: hushhq/hush-web
          ref: ${{ inputs.hush_web_ref || 'main' }}
          path: hush-web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            hush-desktop/package-lock.json
            hush-web/package-lock.json

      - name: Install hush-web dependencies
        run: npm ci
        working-directory: hush-web

      - name: Install hush-desktop dependencies
        run: npm ci
        working-directory: hush-desktop

      - name: Typecheck desktop
        run: npm run typecheck
        working-directory: hush-desktop

      - name: Test desktop
        run: npm test
        working-directory: hush-desktop

      - name: Build signed macOS artifacts
        if: matrix.platform == 'mac'
        run: npm run ${{ matrix.script }} -- --publish never
        working-directory: hush-desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          HUSH_DESKTOP_NOTARIZE: '1'
          HUSH_DESKTOP_RELEASE_BUILD: '1'
          HUSH_DESKTOP_STRICT_RELEASE: '1'

      - name: Build unsigned non-macOS artifacts
        if: matrix.platform != 'mac'
        run: npm run ${{ matrix.script }} -- --publish never
        working-directory: hush-desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          HUSH_DESKTOP_RELEASE_BUILD: '1'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            hush-desktop/dist/*.dmg
            hush-desktop/dist/*.zip
            hush-desktop/dist/*.exe
            hush-desktop/dist/*.AppImage
            hush-desktop/dist/*.deb
            hush-desktop/dist/*.tar.gz
            hush-desktop/dist/latest*.yml
            hush-desktop/dist/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name sha256sums.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum > sha256sums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'mvp') }}
          generate_release_notes: true
          files: release-assets/*
